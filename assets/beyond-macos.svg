<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- macOS continuous squircle clip path (approximated with cubic beziers) -->
    <clipPath id="squircle">
      <path d="
        M 512 0
        C 734 0, 838 0, 899 21
        C 960 42, 982 64, 1003 125
        C 1024 186, 1024 290, 1024 512
        C 1024 734, 1024 838, 1003 899
        C 982 960, 960 982, 899 1003
        C 838 1024, 734 1024, 512 1024
        C 290 1024, 186 1024, 125 1003
        C 64 982, 42 960, 21 899
        C 0 838, 0 734, 0 512
        C 0 290, 0 186, 21 125
        C 42 64, 64 42, 125 21
        C 186 0, 290 0, 512 0
        Z"/>
    </clipPath>

    <!-- Star gradient -->
    <linearGradient id="starGrad" x1="512" y1="200" x2="512" y2="824" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D9BF"/>
      <stop offset="0.35" stop-color="#26A6F2"/>
      <stop offset="0.65" stop-color="#8C4DF2"/>
      <stop offset="1" stop-color="#E63399"/>
    </linearGradient>

    <!-- Liquid glass: top highlight -->
    <linearGradient id="glassTop" x1="512" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.12"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Liquid glass: edge shine -->
    <radialGradient id="glassShine" cx="0.35" cy="0.15" r="0.7">
      <stop stop-color="white" stop-opacity="0.10"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle inner shadow for depth -->
    <linearGradient id="innerShadow" x1="512" y1="824" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop stop-color="black" stop-opacity="0"/>
      <stop offset="1" stop-color="black" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Everything clipped to squircle -->
  <g clip-path="url(#squircle)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="#0F0F1F"/>

    <!-- Subtle radial glow behind star -->
    <circle cx="512" cy="512" r="350" fill="#1a1a3a" opacity="0.6"/>

    <!-- Star shape (scaled from 400 to 1024 canvas: multiply coords by 2.56) -->
    <path d="
      M 510.87 199.68
      L 537.48 466.97
      L 671.34 420.91
      L 563.94 512
      L 671.34 603.09
      L 537.48 557.03
      L 510.87 824.32
      L 484.26 557.03
      L 350.72 603.09
      L 458.12 512
      L 350.72 420.91
      L 484.26 466.97
      L 510.87 199.68
      Z" fill="url(#starGrad)"/>

    <!-- Glass highlight overlay -->
    <rect width="1024" height="512" fill="url(#glassTop)"/>
    <rect width="1024" height="1024" fill="url(#glassShine)"/>

    <!-- Bottom shadow for depth -->
    <rect y="700" width="1024" height="324" fill="url(#innerShadow)"/>
  </g>
</svg>
